<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order a Book</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #1a1a1a;
    font-family: Arial, sans-serif;
    color: white;
  }

  .container {
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 20px;
    width: 90%;
    max-width: 450px;
    margin: 20px auto;
    box-shadow: 0 0 12px rgba(255,255,255,0.6);
  }

  h2 {
    text-align: center;
    text-shadow: 0 0 6px rgba(255,255,255,0.6);
  }

  label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
    text-shadow: 0 0 6px rgba(255,255,255,0.6);
  }

  input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: none;
    outline: none;
  }

  textarea {
    height: 80px;
    resize: none;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #4CAF50;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Book Order Form</h2>

  <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">

    <label>Your Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone (optional)</label>
    <input type="text" name="phone">

    <label>Book Title</label>
    <input type="text" name="book_title" required>

    <label>Format</label>
    <select name="format" required>
      <option value="Paperback">Paperback</option>
      <option value="Hardcover">Hardcover</option>
      <option value="Other">Other</option>
    </select>

    <label>Quantity</label>
    <input type="number" name="quantity" min="1" value="1" required>

    <label>Delivery Address</label>
    <input type="text" name="address" required>

    <label>City</label>
    <input type="text" name="city" required>

    <label>State</label>
    <input type="text" name="state" required>

    <label>ZIP Code</label>
    <input type="text" name="zip" required>

    <label>Payment Method</label>
    <select name="payment" required>
      <option value="Cash">Cash</option>
      <option value="PayPal">PayPal</option>
      <option value="Cash App">Cash App</option>
      <option value="Venmo">Venmo</option>
    </select>

    <label>Special Notes (optional)</label>
    <textarea name="notes" placeholder="Gift wrap, leave on porch, etc."></textarea>

    <label>
      <input type="checkbox" name="receipt">
      I would like a receipt
    </label>

    <button type="submit">Submit Order</button>
  </form>
</div>

</body>
</html>
